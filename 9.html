<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>地质灾害隐患点管理系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#f0f2f5;color:#333;min-height:100vh}
button{cursor:pointer;border:none;border-radius:8px;font-size:14px;transition:all .2s}
input,select,textarea{font-family:inherit;font-size:14px;border:1px solid #ddd;border-radius:8px;padding:10px 12px;outline:none}
input:focus,select:focus,textarea:focus{border-color:#2d6a9f}
.login-wrap{max-width:400px;margin:80px auto 0;background:#fff;padding:40px 30px;border-radius:16px;box-shadow:0 10px 40px rgba(0,0,0,.08);text-align:center}
.login-wrap h2{font-size:24px;color:#1a3a5c;margin-bottom:4px}
.login-wrap .pw{width:100%;padding:12px;margin:24px 0 12px;text-align:center;font-size:18px;letter-spacing:4px}
.login-wrap .btn{width:100%;padding:12px;background:#2d6a9f;color:#fff;font-size:16px;font-weight:600}
.login-wrap .err{color:#e74c3c;font-size:13px;min-height:20px;margin-top:8px}
.admin-wrap{max-width:1200px;margin:0 auto;padding:16px}
.admin-header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:#fff;border-radius:12px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.04);flex-wrap:wrap;gap:10px}
.admin-header h2{font-size:20px;color:#1a3a5c}
.admin-header .btns{display:flex;gap:8px;flex-wrap:wrap}
.admin-header .btns button{padding:8px 16px;font-weight:500}
.btn-primary{background:#2d6a9f;color:#fff}
.btn-outline{background:#fff;color:#2d6a9f;border:1px solid #2d6a9f}
.btn-danger{background:#e74c3c;color:#fff}
.btn-success{background:#27ae60;color:#fff}
.admin-body{display:flex;gap:16px;flex-wrap:wrap}
.admin-left{flex:1;min-width:280px;background:#fff;border-radius:12px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.04);max-height:80vh;overflow-y:auto}
.admin-right{flex:2;min-width:340px;background:#fff;border-radius:12px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.record-list-item{display:flex;align-items:center;justify-content:space-between;padding:12px;border-bottom:1px solid #f0f0f0;cursor:pointer;border-radius:6px}
.record-list-item:hover{background:#f5f8fb}
.record-list-item.active{background:#e8f0f8;border-left:3px solid #2d6a9f}
.record-list-item .name{font-weight:600;font-size:15px;color:#1a3a5c}
.record-list-item .sub{font-size:12px;color:#999;margin-top:2px}
.record-list-item .actions{display:flex;gap:4px;flex-shrink:0}
.record-list-item .actions button{padding:4px 10px;font-size:12px;border-radius:4px}
.search-box{width:100%;margin-bottom:12px}
.search-box input{width:100%}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px}
.form-grid .full{grid-column:1/-1}
.form-group{margin-bottom:2px}
.form-group label{display:block;font-size:12px;color:#666;margin-bottom:3px;font-weight:500}
.form-group input,.form-group select,.form-group textarea{width:100%}
.form-group textarea{resize:vertical;min-height:60px}
.form-actions{display:flex;gap:10px;margin-top:16px;justify-content:flex-end}
.img-upload-box{width:120px;height:120px;border:2px dashed #ddd;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;position:relative;flex-shrink:0}
.img-upload-box:hover{border-color:#2d6a9f}
.img-upload-box img{width:100%;height:100%;object-fit:cover;display:none}
.img-upload-box .placeholder{font-size:12px;color:#bbb;text-align:center}
.img-upload-box input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.phone-frame{width:375px;min-height:600px;border:2px solid #333;border-radius:30px;overflow:hidden;background:#fff;margin:16px auto;box-shadow:0 10px 40px rgba(0,0,0,.15)}
.phone-notch{height:24px;background:#1a1a1a}
.phone-screen{max-height:520px;overflow-y:auto;min-height:500px}
.detail-nav{display:flex;justify-content:center;background:#fff;border-bottom:1px solid #eee;position:sticky;top:0;z-index:50;overflow-x:auto}
.detail-nav span{flex-shrink:0;padding:12px 14px;font-size:13px;color:#666;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.detail-nav span.active,.detail-nav span:hover{color:#2d6a9f;border-bottom-color:#2d6a9f;font-weight:600}
.detail-top{background:linear-gradient(160deg,#1a5276,#2e86c1);color:#fff;padding:24px 18px 20px;text-align:center}
.detail-top .type-tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;background:rgba(255,255,255,.2);margin-bottom:8px}
.detail-top h2{font-size:20px;font-weight:700;margin-bottom:4px}
.detail-top .sub{font-size:13px;opacity:.85;display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.risk-badge{display:inline-flex;padding:5px 12px;border-radius:6px;font-size:13px;font-weight:700;margin-top:8px}
.risk-high{background:#ffe0e0;color:#c0392b}
.risk-medium{background:#fff3d6;color:#e67e22}
.risk-low{background:#d5f5e3;color:#27ae60}
.detail-section{padding:14px 16px;border-bottom:1px solid #f0f0f0}
.detail-section-title{font-size:14px;font-weight:600;color:#1a3a5c;margin-bottom:10px;padding-left:8px;border-left:3px solid #2d6a9f}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 14px}
.detail-field{margin-bottom:2px}
.f-label{font-size:11px;color:#999;margin-bottom:2px}
.f-value{font-size:13px;color:#333;word-break:break-all}
.detail-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:6px}
.detail-table th,.detail-table td{padding:8px 10px;text-align:left;border-bottom:1px solid #eee}
.detail-table th{background:#f5f8fb;font-weight:600;color:#1a3a5c;font-size:12px}
.detail-img{width:100%;border-radius:8px;margin-top:8px;max-height:280px;object-fit:contain;background:#f9f9f9}
.weather-box{background:#f0f7ff;border-radius:10px;padding:14px 16px;margin:10px 0}
.weather-box table{width:100%;font-size:13px;border-collapse:collapse}
.weather-box td{padding:6px 8px;border-bottom:1px solid #e0ecf8}
.weather-box td:first-child{color:#666}
.weather-box td:last-child{color:#1a3a5c;font-weight:500}
.contact-card{display:flex;align-items:center;gap:10px;padding:10px;background:#fafafa;border-radius:8px;margin-bottom:6px}
.contact-card .cname{font-size:14px;font-weight:600;color:#333}
.contact-card .crole{font-size:11px;color:#999}
.contact-card .cphone{font-size:15px;color:#2d6a9f;font-weight:600;margin-top:2px}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);padding:10px 24px;border-radius:20px;color:#fff;font-size:14px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.toast.success{background:#27ae60}
.toast.error{background:#e74c3c}
.video-placeholder{background:#f9f9f9;border-radius:10px;padding:40px 20px;text-align:center;color:#999;margin:10px 0}
@media(max-width:768px){.admin-body{flex-direction:column}.phone-frame{width:100%;border-radius:0;border:none;box-shadow:none}.form-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="loginPage">
<div class="login-wrap">
<div style="font-size:48px;margin-bottom:8px">&#x1F30D;</div>
<h2>地质灾害隐患点管理系统</h2>
<p style="color:#999;margin:4px 0 20px;font-size:13px">输入密码进入后台管理</p>
<input type="password" id="loginPw" class="pw" placeholder="管理密码" onkeydown="if(event.key==='Enter')doLogin()">
<div class="err" id="loginErr"></div>
<button class="btn" onclick="doLogin()">进入后台</button>
</div>
</div>
<div id="adminPage" style="display:none">
<div class="admin-wrap">
<div class="admin-header">
<h2>&#x2699; 地质灾害隐患点管理</h2>
<div class="btns">
<button class="btn-outline" onclick="exportPages()">&#x1F4E4; 导出页面</button>
<button class="btn-outline" onclick="downloadTemplate()">&#x1F4CB; 导入模板</button>
<button class="btn-success" onclick="document.getElementById('excelFile').click()">&#x1F4E5; 导入Excel</button>
<input type="file" id="excelFile" accept=".xlsx,.xls,.csv" style="display:none" onchange="importExcel(this)">
<button class="btn-outline" onclick="doLogout()">&#x1F6AA; 退出</button>
</div>
</div>
<div class="admin-body">
<div class="admin-left">
<div class="search-box"><input type="text" placeholder="&#x1F50D; 搜索隐患点..." oninput="RL(this.value)"></div>
<div id="recordList"></div>
<div style="text-align:center;padding:12px">
<button class="btn-primary" style="width:100%" onclick="addNew()">+ 新建隐患点</button>
</div>
</div>
<div class="admin-right">
<div style="font-weight:600;color:#1a3a5c;margin-bottom:12px;font-size:15px">&#x1F4DD; 编辑区</div>
<form id="recordForm" onsubmit="return false">
<input type="hidden" id="editId">
<div class="form-grid">
<div class="form-group"><label>灾害名称 *</label><input id="f_name" required></div>
<div class="form-group"><label>统一编号</label><input id="f_code"></div>
<div class="form-group"><label>灾害类型 *</label><select id="f_type"><option>滑坡</option><option>崩塌</option><option>泥石流</option><option>地面塌陷</option><option>地裂缝</option><option>冰湖溃决</option></select></div>
<div class="form-group"><label>风险等级 *</label><select id="f_level"><option>低风险</option><option>中风险</option><option selected>高风险</option><option>极高风险</option></select></div>
<div class="form-group"><label>规模等级</label><select id="f_scale"><option>小型</option><option>中型</option><option>大型</option><option>特大型</option></select></div>
<div class="form-group"><label>体积(万m³)</label><input id="f_volume"></div>
<div class="form-group full"><label>地理位置 *</label><input id="f_location" required placeholder="XX省XX市XX县XX乡镇XX村"></div>
<div class="form-group"><label>经度</label><input id="f_lng" placeholder="87.12"></div>
<div class="form-group"><label>纬度</label><input id="f_lat" placeholder="28.55"></div>
<div class="form-group"><label>调查日期</label><input type="date" id="f_date"></div>
<div class="form-group"><label>发现时间</label><input id="f_foundDate" placeholder="2024年6月"></div>
<div class="form-group"><label>方向(°)</label><input id="f_direction"></div>
<div class="form-group"><label>坡度(°)</label><input id="f_slope"></div>
<div class="form-group"><label>长(m)</label><input id="f_size"></div>
<div class="form-group"><label>宽(m)</label><input id="f_width"></div>
<div class="form-group"><label>厚度(m)</label><input id="f_thick"></div>
<div class="form-group"><label>物质组成</label><input id="f_material"></div>
<div class="form-group"><label>运动形式</label><select id="f_movement"><option></option><option>牵引式</option><option>推移式</option><option>错落式</option><option>倾倒式</option></select></div>
<div class="form-group"><label>主导诱因</label><input id="f_cause" placeholder="暴雨、融雪、地震"></div>
<div class="form-group"><label>现状稳定性</label><select id="f_stability"><option></option><option>稳定</option><option>基本稳定</option><option>稳定性差</option><option>不稳定</option></select></div>
<div class="form-group"><label>预测稳定性</label><select id="f_predStability"><option></option><option>稳定</option><option>基本稳定</option><option>稳定性差</option><option>不稳定</option></select></div>
<div class="form-group"><label>危险性</label><select id="f_danger"><option></option><option>低</option><option>中</option><option>高</option><option>极高</option></select></div>
<div class="form-group"><label>损失等级</label><select id="f_lossLevel"><option></option><option>一般</option><option>较大</option><option>重大</option><option>特别重大</option></select></div>
<div class="form-group full"><label>威胁人员</label><input id="f_threatPeople" placeholder="X户共X人"></div>
<div class="form-group full"><label>威胁基础设施</label><input id="f_threatInfra" placeholder="国道、铁路、输电线路"></div>
<div class="form-group full"><label>威胁自然环境</label><input id="f_threatEnv" placeholder="农田、草地、河流"></div>
<div class="form-group full"><label>变形特征</label><textarea id="f_deform"></textarea></div>
<div class="form-group full"><label>防治建议</label><textarea id="f_advice"></textarea></div>
<div class="form-group"><label>群测群防员</label><input id="f_monitor"></div>
<div class="form-group"><label>群防员电话</label><input id="f_monitorPhone"></div>
<div class="form-group"><label>片区负责人</label><input id="f_areaManager"></div>
<div class="form-group"><label>片区电话</label><input id="f_areaManagerPhone"></div>
<div class="form-group"><label>驻守地质队员</label><input id="f_geologist"></div>
<div class="form-group"><label>地质队员电话</label><input id="f_geologistPhone"></div>
<div class="form-group"><label>县级电话</label><input id="f_countyPhone"></div>
<div class="form-group full"><label>防灾避险图</label><div style="display:flex;gap:12px"><div class="img-upload-box"><img id="imgPrev1"><div class="placeholder" id="imgPh1">点击上传<br>图片</div><input type="file" accept="image/*" onchange="handleImg(1,this)"></div></div></div>
<div class="form-group full"><label>地质勘查剖面图</label><div style="display:flex;gap:12px"><div class="img-upload-box"><img id="imgPrev2"><div class="placeholder" id="imgPh2">点击上传<br>图片</div><input type="file" accept="image/*" onchange="handleImg(2,this)"></div></div></div>
</div>
<div class="form-actions">
<button type="button" class="btn-outline" id="btnCancel" style="display:none" onclick="cancelEdit()">取消</button>
<button type="submit" class="btn-primary" id="btnSubmit" onclick="saveRecord()">保存记录</button>
</div>
</form>
<div style="text-align:center;margin-top:20px">
<h4 style="color:#666;margin-bottom:8px">&#x1F4F1; 手机预览</h4>
<div class="phone-frame">
<div class="phone-notch"></div>
<div class="phone-screen" id="phonePreview">
<div style="text-align:center;padding:40px;color:#999">选择左侧隐患点查看预览</div>
</div>
</div>
</div>
</div>
</div>
</div>
</div>
<div class="toast" id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
var SK="gh_v8",PW="admin123",currentId=null;
function R(){try{return JSON.parse(localStorage.getItem(SK)||"[]")}catch(e){return[]}}
function S(d){try{localStorage.setItem(SK,JSON.stringify(d))}catch(e){}}
function GID(){return"r_"+Date.now()+"_"+Math.random().toString(36).slice(2,7)}
function esc(s){if(!s)return"";return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function toast(m,t){var el=document.getElementById("toast");el.textContent=m;el.className="toast "+(t||"success")+" show";clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove("show")},2500)}
function doLogin(){if(document.getElementById("loginPw").value===PW){document.getElementById("loginPage").style.display="none";document.getElementById("adminPage").style.display="block";RL()}else{document.getElementById("loginErr").textContent="密码错误，请重试"}}
function doLogout(){document.getElementById("adminPage").style.display="none";document.getElementById("loginPage").style.display="block";document.getElementById("loginPw").value="";currentId=null;document.getElementById("phonePreview").innerHTML='<div style="text-align:center;padding:40px;color:#999">选择左侧隐患点查看预览</div>'}
function cancelEdit(){resetForm();currentId=null;RL()}
function RL(filter){var rs=R(),q=(filter||"").toLowerCase();if(q)rs=rs.filter(function(r){return(r.name||"").toLowerCase().indexOf(q)>=0||(r.location||"").toLowerCase().indexOf(q)>=0});var h="";rs.forEach(function(r){var cls=(currentId===r.id)?"active":"";h+='<div class="record-list-item '+cls+'" onclick="selectRecord(\''+r.id+'\')"><div style="flex:1"><div class="name">'+esc(r.name||"未命名")+'</div><div class="sub">'+esc(r.type||"")+' | '+esc(r.level||"")+' | '+esc(r.location||"")+'</div></div><div class="actions"><button class="btn-outline" onclick="event.stopPropagation();editRecord(\''+r.id+'\')">编辑</button><button class="btn-danger" onclick="event.stopPropagation();deleteRecord(\''+r.id+'\')">删除</button></div></div>'});document.getElementById("recordList").innerHTML=h||'<div style="text-align:center;padding:40px;color:#999">暂无记录</div>'}
function selectRecord(id){currentId=id;RL();renderPreview(R().find(function(x){return x.id===id}))}
function addNew(){resetForm();document.getElementById("phonePreview").innerHTML='<div style="text-align:center;padding:40px;color:#999">保存后查看预览</div>';window.scrollTo({top:0,behavior:"smooth"})}
function resetForm(){var ids=["name","code","type","level","scale","volume","location","lng","lat","date","foundDate","direction","slope","size","width","thick","material","movement","cause","stability","predStability","danger","lossLevel","threatPeople","threatInfra","threatEnv","deform","advice","monitor","monitorPhone","areaManager","areaManagerPhone","geologist","geologistPhone","countyPhone"];ids.forEach(function(id){var el=document.getElementById("f_"+id);if(el){if(el.tagName==="SELECT")el.selectedIndex=0;else el.value=""}});document.getElementById("editId").value="";document.getElementById("btnCancel").style.display="none";document.getElementById("btnSubmit").textContent="保存记录";document.getElementById("imgPrev1").style.display="none";document.getElementById("imgPh1").style.display="";document.getElementById("imgPrev2").style.display="none";document.getElementById("imgPh2").style.display=""}
function editRecord(id){var r=R().find(function(x){return x.id===id});if(!r)return;var fields=["name","code","type","level","scale","volume","location","lng","lat","date","foundDate","direction","slope","size","width","thick","material","movement","cause","stability","predStability","danger","lossLevel","threatPeople","threatInfra","threatEnv","deform","advice","monitor","monitorPhone","areaManager","areaManagerPhone","geologist","geologistPhone","countyPhone"];fields.forEach(function(f){var el=document.getElementById("f_"+f);if(el)el.value=r[f]||""});document.getElementById("editId").value=id;document.getElementById("btnCancel").style.display="";document.getElementById("btnSubmit").textContent="更新记录";if(r.img1){document.getElementById("imgPrev1").src=r.img1;document.getElementById("imgPrev1").style.display="";document.getElementById("imgPh1").style.display="none"}if(r.img2){document.getElementById("imgPrev2").src=r.img2;document.getElementById("imgPrev2").style.display="";document.getElementById("imgPh2").style.display="none"}currentId=id;RL();renderPreview(r);window.scrollTo({top:0,behavior:"smooth"})}
function saveRecord(){var fields=["name","code","type","level","scale","volume","location","lng","lat","date","foundDate","direction","slope","size","width","thick","material","movement","cause","stability","predStability","danger","lossLevel","threatPeople","threatInfra","threatEnv","deform","advice","monitor","monitorPhone","areaManager","areaManagerPhone","geologist","geologistPhone","countyPhone"];var r={};fields.forEach(function(f){r[f]=document.getElementById("f_"+f).value});r.img1=document.getElementById("imgPrev1").src||"";r.img2=document.getElementById("imgPrev2").src||"";r.updatedAt=new Date().toISOString();if(!r.name||!r.type||!r.level||!r.location){toast("请填写必填字段：名称、类型、风险等级、地理位置","error");return}var rs=R(),eid=document.getElementById("editId").value;if(eid){var idx=rs.findIndex(function(x){return x.id===eid});if(idx>=0){r.id=eid;r.createdAt=rs[idx].createdAt;rs[idx]=r}}else{r.id=GID();r.createdAt=new Date().toISOString();rs.unshift(r)}S(rs);currentId=r.id;RL();renderPreview(r);toast(eid?"已更新":"已保存","success");document.getElementById("editId").value=r.id;document.getElementById("btnCancel").style.display="";document.getElementById("btnSubmit").textContent="更新记录"}
function deleteRecord(id){if(!confirm("确定删除？"))return;S(R().filter(function(x){return x.id!==id}));if(currentId===id){currentId=null;document.getElementById("phonePreview").innerHTML='<div style="text-align:center;padding:40px;color:#999">选择左侧隐患点查看预览</div>'}RL();toast("已删除","success")}
function handleImg(n,input){var file=input.files[0];if(!file)return;if(file.size>2*1024*1024){toast("图片不能超过2MB","error");input.value="";return}var reader=new FileReader();reader.onload=function(e){var img=new Image();img.onload=function(){var canvas=document.createElement("canvas");var s=Math.min(1,800/img.width);canvas.width=img.width*s;canvas.height=img.height*s;canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);var dataUrl=canvas.toDataURL("image/jpeg",0.75);document.getElementById("imgPrev"+n).src=dataUrl;document.getElementById("imgPrev"+n).style.display="";document.getElementById("imgPh"+n).style.display="none"};img.src=e.target.result};reader.readAsDataURL(file)}

function fetchWeather(lng,lat,cb){var xhr=new XMLHttpRequest();xhr.open("GET","https://api.open-meteo.com/v1/forecast?latitude="+lat+"&longitude="+lng+"&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weather_code,precipitation&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,wind_speed_10m_max&timezone=Asia%2FShanghai&forecast_days=7",true);xhr.timeout=12000;xhr.onload=function(){if(xhr.status===200){try{cb(JSON.parse(xhr.responseText))}catch(e){cb(null)}}else{cb(null)}};xhr.onerror=function(){cb(null)};xhr.ontimeout=function(){cb(null)};xhr.send()}
